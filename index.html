<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNSPOTTED — Born from vitiligo.</title>
  <meta name="description" content="Marca de ropa streetwear mexicana independiente. Diseños de serigrafía artesanal en tiraje limitado. Born from vitiligo. Define your own spots." />
  <meta property="og:title" content="UNSPOTTED" />
  <meta property="og:description" content="Born from vitiligo. Define your own spots." />
  <meta property="og:image" content="assets/UNSPOTTEDg.png" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/png" href="assets/UNSPOTTEDg.png" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/cart.css" />
  <style>
    /* --- Hero --- */
    .hero {
      position: relative;
      height: 100vh;
      min-height: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--black);
      overflow: hidden;
    }

    .hero__video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.55;
      pointer-events: none;
    }

    .hero__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.35) 0%,
        rgba(0,0,0,0.15) 50%,
        rgba(0,0,0,0.6) 100%
      );
      pointer-events: none;
    }

    .hero__logo-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      will-change: transform;
    }

    .hero__logo {
      width: clamp(180px, 40vw, 340px);
      height: auto;
      filter: invert(1);
    }

    .hero__logo-text {
      font-family: var(--font-display);
      font-size: clamp(56px, 12vw, 120px);
      letter-spacing: 0.06em;
      color: var(--white);
      line-height: 1;
    }

    .hero__tagline {
      font-family: var(--font-body);
      font-size: 13px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gray-text);
    }

    /* --- Tagline Section --- */
    .section-tagline {
      padding: 120px 32px;
      text-align: center;
      background-color: var(--black);
    }

    .tagline-lines {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .tagline-line {
      font-family: var(--font-display);
      font-size: clamp(52px, 11vw, 120px);
      color: var(--white);
      line-height: 0.95;
      letter-spacing: 0.02em;
    }

    /* --- Drop Section --- */
    .section-drop {
      padding: 80px 32px;
      max-width: var(--max-content);
      margin: 0 auto;
    }

    .section-drop__grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin: 32px 0 48px;
    }

    .drop-item__image {
      aspect-ratio: 3 / 4;
      background-color: var(--gray-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .drop-item__image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .drop-item__image span {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gray-mid);
    }

    .drop-item__name {
      font-family: var(--font-display);
      font-size: 24px;
      letter-spacing: 0.04em;
      color: var(--white);
      margin-top: 14px;
      line-height: 1;
    }

    .drop-item__price {
      font-size: 14px;
      color: var(--gray-text);
      margin-top: 6px;
    }

    .section-drop__cta {
      text-align: center;
    }

    /* --- Quote Section --- */
    .section-quote {
      padding: 120px 32px;
      background-color: #0A0A0A;
      text-align: center;
    }

    .section-quote__text {
      font-family: var(--font-body);
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 300;
      color: var(--white);
      letter-spacing: 0.08em;
      font-style: italic;
    }

    /* --- Responsive --- */
    @media (max-width: 600px) {
      .section-drop__grid {
        grid-template-columns: 1fr;
        gap: 40px;
      }

      .section-tagline {
        padding: 80px 20px;
      }

      .section-drop {
        padding: 60px 20px;
      }

      .section-quote {
        padding: 80px 20px;
      }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="navbar__logo">
      <img src="assets/UNSPOTTEDg.png" alt="UNSPOTTED"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
      <span class="navbar__logo-text" style="display:none;">UNSPOTTED</span>
    </a>
    <ul class="navbar__links">
      <li><a href="drops.html">Drops</a></li>
      <li><a href="lore.html">Lore</a></li>
      <li><a href="contact.html">Social</a></li>
    </ul>
    <button class="navbar__cart" id="navbar-cart-btn" aria-label="Carrito">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 6h15l-1.5 9h-12z"/>
        <path d="M6 6L4.5 3H2"/>
        <circle cx="9" cy="20" r="1"/>
        <circle cx="18" cy="20" r="1"/>
      </svg>
      <span class="navbar__cart-badge" id="navbar-cart-badge" style="display:none;">0</span>
    </button>
    <button class="navbar__hamburger" aria-label="Menú">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <!-- MOBILE OVERLAY -->
  <div class="nav-overlay">
    <a href="drops.html">Drops</a>
    <a href="lore.html">Lore</a>
    <a href="contact.html">Social</a>
  </div>

  <!-- CART DRAWER (ver js/cart.js) -->
  <div class="cart-drawer" id="cart-drawer" aria-hidden="true">
    <div class="cart-drawer__backdrop" id="cart-drawer-backdrop"></div>
    <div class="cart-drawer__panel" role="dialog" aria-modal="true" aria-labelledby="cart-drawer-title">
      <div class="cart-drawer__header">
        <p class="cart-drawer__title" id="cart-drawer-title">Carrito</p>
        <button type="button" class="cart-drawer__close" id="cart-drawer-close" aria-label="Cerrar">&times;</button>
      </div>
      <div class="cart-drawer__items" id="cart-drawer-items"></div>
      <p class="cart-drawer__empty" id="cart-drawer-empty">Tu carrito está vacío.</p>
      <div class="cart-drawer__footer hidden" id="cart-drawer-footer">
        <div class="cart-drawer__field">
          <label class="cart-drawer__label" for="cart-drawer-discount">Código de descuento (opcional)</label>
          <input type="text" id="cart-drawer-discount" class="cart-drawer__input" placeholder="CÓDIGO" autocomplete="off" />
        </div>
        <div class="cart-drawer__total" id="cart-drawer-total"></div>
        <button type="button" class="btn-outline cart-drawer__submit" id="cart-drawer-submit" disabled>Pagar ahora →</button>
        <p class="cart-drawer__msg" id="cart-drawer-msg"></p>
      </div>
    </div>
  </div>

  <!-- HERO -->
  <section class="hero">
    <video
      class="hero__video"
      src="assets/OPium.mp4"
      autoplay
      muted
      loop
      playsinline
      preload="auto"
    ></video>
    <div class="hero__overlay"></div>
    <div class="hero__logo-wrap">
      <img
        class="hero__logo"
        src="assets/UNSPOTTEDg.png"
        alt="UNSPOTTED"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"
      />
      <span class="hero__logo-text" style="display:none;">UNSPOTTED</span>
      <p class="hero__tagline">Born from vitiligo.</p>
    </div>
  </section>

  <!-- TAGLINE -->
  <section class="section-tagline">
    <div class="tagline-lines">
      <span class="tagline-line fade-in">WE WERE NEVER</span>
      <span class="tagline-line fade-in delay-1">MEANT TO LOOK</span>
      <span class="tagline-line fade-in delay-2">THE SAME.</span>
    </div>
  </section>

  <!-- DROP ACTUAL (cargado dinámicamente desde Supabase — ver js/products.js) -->
  <section class="section-drop">
    <p class="section-label fade-in">Available Now — Drop 001</p>
    <div class="section-drop__grid" id="home-drop-preview"></div>
    <div class="section-drop__cta fade-in">
      <a href="drops.html" class="btn-outline">Ver Drop Completo →</a>
    </div>
  </section>

  <!-- QUOTE -->
  <section class="section-quote">
    <p class="section-quote__text fade-in">"Define your own spots."</p>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <span class="footer__copy">© UNSPOTTED</span>
    <div class="footer__links">
      <a href="https://instagram.com/unspotted.official" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
        </svg>
        @unspotted.official
      </a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
