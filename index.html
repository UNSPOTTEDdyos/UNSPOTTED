<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNSPOTTED — Born from vitiligo.</title>
  <meta name="description" content="Marca de ropa streetwear mexicana independiente. Diseños de serigrafía artesanal en tiraje limitado. Born from vitiligo. Define your own spots." />
  <meta property="og:title" content="UNSPOTTED" />
  <meta property="og:description" content="Born from vitiligo. Define your own spots." />
  <meta property="og:image" content="assets/UNSPOTTEDg.png" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/png" href="assets/UNSPOTTEDg.png" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* --- Hero --- */
    .hero {
      position: relative;
      height: 100vh;
      min-height: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--black);
      overflow: hidden;
    }

    .hero__video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.55;
      pointer-events: none;
    }

    .hero__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.35) 0%,
        rgba(0,0,0,0.15) 50%,
        rgba(0,0,0,0.6) 100%
      );
      pointer-events: none;
    }

    .hero__logo-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      will-change: transform;
    }

    .hero__logo {
      width: clamp(180px, 40vw, 340px);
      height: auto;
      filter: invert(1);
    }

    .hero__logo-text {
      font-family: var(--font-display);
      font-size: clamp(56px, 12vw, 120px);
      letter-spacing: 0.06em;
      color: var(--white);
      line-height: 1;
    }

    .hero__tagline {
      font-family: var(--font-body);
      font-size: 13px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gray-text);
    }

    /* --- Tagline Section --- */
    .section-tagline {
      padding: 120px 32px;
      text-align: center;
      background-color: var(--black);
    }

    .tagline-lines {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .tagline-line {
      font-family: var(--font-display);
      font-size: clamp(52px, 11vw, 120px);
      color: var(--white);
      line-height: 0.95;
      letter-spacing: 0.02em;
    }

    /* --- Drop Section --- */
    .section-drop {
      padding: 80px 32px;
      max-width: var(--max-content);
      margin: 0 auto;
    }

    .section-drop__grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin: 32px 0 48px;
    }

    .drop-item__image {
      aspect-ratio: 3 / 4;
      background-color: var(--gray-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .drop-item__image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .drop-item__image span {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gray-mid);
    }

    .drop-item__name {
      font-family: var(--font-display);
      font-size: 24px;
      letter-spacing: 0.04em;
      color: var(--white);
      margin-top: 14px;
      line-height: 1;
    }

    .drop-item__price {
      font-size: 14px;
      color: var(--gray-text);
      margin-top: 6px;
    }

    .section-drop__cta {
      text-align: center;
    }

    /* --- Quote Section --- */
    .section-quote {
      padding: 120px 32px;
      background-color: #0A0A0A;
      text-align: center;
    }

    .section-quote__text {
      font-family: var(--font-body);
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 300;
      color: var(--white);
      letter-spacing: 0.08em;
      font-style: italic;
    }

    /* --- Responsive --- */
    @media (max-width: 600px) {
      .section-drop__grid {
        grid-template-columns: 1fr;
        gap: 40px;
      }

      .section-tagline {
        padding: 80px 20px;
      }

      .section-drop {
        padding: 60px 20px;
      }

      .section-quote {
        padding: 80px 20px;
      }
    }
  </style>
</head>

  <!-- HERO -->

  <!-- QUOTE -->
