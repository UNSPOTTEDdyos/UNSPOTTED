<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNSPOTTED — Drop 001</title>
  <meta name="description" content="Drop 001 — Piezas de serigrafía artesanal en tiraje limitado. Paga en línea, seguro." />
  <meta property="og:title" content="UNSPOTTED — Drop 001" />
  <meta property="og:description" content="Limited units. Handmade silkscreen." />
  <meta property="og:image" content="assets/UNSPOTTEDg.png" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/png" href="assets/UNSPOTTEDg.png" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/drops.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="navbar__logo">
      <img src="assets/UNSPOTTEDg.png" alt="UNSPOTTED"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
      <span class="navbar__logo-text" style="display:none;">UNSPOTTED</span>
    </a>
    <ul class="navbar__links">
      <li><a href="drops.html">Drops</a></li>
      <li><a href="lore.html">Lore</a></li>
      <li><a href="contact.html">Social</a></li>
    </ul>
    <button class="navbar__hamburger" aria-label="Menú">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <!-- MOBILE OVERLAY -->
  <div class="nav-overlay">
    <a href="drops.html">Drops</a>
    <a href="lore.html">Lore</a>
    <a href="contact.html">Social</a>
  </div>

  <!-- PAGE HEADER -->
  <header class="drops-header fade-in">
    <h1 class="drops-header__title">DROP 001</h1>
    <p class="drops-header__subtitle">Limited units. Handmade silkscreen.</p>
  </header>

  <!-- ACTIVE DROP GRID (cargado dinámicamente desde Supabase — ver js/products.js) -->
  <section class="drops-grid" id="drops-grid"></section>

  <!-- ORDER MODAL: talla + código de descuento (ver js/checkout.js) -->
  <div class="order-modal" id="order-modal" aria-hidden="true">
    <div class="order-modal__backdrop" id="order-modal-backdrop"></div>
    <div class="order-modal__panel" role="dialog" aria-modal="true" aria-labelledby="order-modal-name">
      <button type="button" class="order-modal__close" id="order-modal-close" aria-label="Cerrar">&times;</button>
      <div class="order-modal__product">
        <img class="order-modal__img" id="order-modal-img" src="" alt="" />
        <div>
          <p class="order-modal__name" id="order-modal-name"></p>
          <p class="order-modal__price" id="order-modal-price"></p>
        </div>
      </div>
      <div class="order-modal__field">
        <label class="order-modal__label">Talla</label>
        <div class="size-chips" id="order-modal-sizes"></div>
      </div>
      <div class="order-modal__field">
        <label class="order-modal__label">Cantidad</label>
        <div class="qty-stepper">
          <button type="button" class="qty-stepper__btn" id="order-modal-qty-minus" aria-label="Quitar uno" disabled>−</button>
          <span class="qty-stepper__value" id="order-modal-qty-value">1</span>
          <button type="button" class="qty-stepper__btn" id="order-modal-qty-plus" aria-label="Agregar uno" disabled>+</button>
        </div>
        <p class="qty-stepper__stock" id="order-modal-qty-stock"></p>
      </div>
      <div class="order-modal__field">
        <label class="order-modal__label" for="order-modal-discount">Código de descuento (opcional)</label>
        <input type="text" id="order-modal-discount" class="order-modal__input" placeholder="CÓDIGO" autocomplete="off" />
      </div>
      <button type="button" class="product-card__btn product-card__btn--pay" id="order-modal-submit" disabled>Pagar ahora →</button>
      <p class="product-card__pay-msg" id="order-modal-msg"></p>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <span class="footer__copy">© UNSPOTTED</span>
    <div class="footer__links">
      <a href="https://instagram.com/unspotted.official" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
        </svg>
        @unspotted.official
      </a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/products.js"></script>
  <script src="js/checkout.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
