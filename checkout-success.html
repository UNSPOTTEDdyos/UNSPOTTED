<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNSPOTTED — Pago exitoso</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="assets/UNSPOTTEDg.png" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/cart.css" />
  <style>
    .result-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 32px 80px;
    }

    .result-page__title {
      font-family: var(--font-display);
      font-size: clamp(48px, 10vw, 96px);
      line-height: 1;
      letter-spacing: 0.02em;
      margin-bottom: 20px;
    }

    .result-page__body {
      max-width: 480px;
      font-size: 15px;
      color: var(--gray-text);
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .result-page__actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="navbar__logo">
      <img src="assets/UNSPOTTEDg.png" alt="UNSPOTTED"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
      <span class="navbar__logo-text" style="display:none;">UNSPOTTED</span>
    </a>
    <ul class="navbar__links">
      <li><a href="drops.html">Drops</a></li>
      <li><a href="lore.html">Lore</a></li>
      <li><a href="contact.html">Social</a></li>
    </ul>
    <button class="navbar__cart" id="navbar-cart-btn" aria-label="Carrito">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 6h15l-1.5 9h-12z"/>
        <path d="M6 6L4.5 3H2"/>
        <circle cx="9" cy="20" r="1"/>
        <circle cx="18" cy="20" r="1"/>
      </svg>
      <span class="navbar__cart-badge" id="navbar-cart-badge" style="display:none;">0</span>
    </button>
    <button class="navbar__hamburger" aria-label="Menú">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <!-- MOBILE OVERLAY -->
  <div class="nav-overlay">
    <a href="drops.html">Drops</a>
    <a href="lore.html">Lore</a>
    <a href="contact.html">Social</a>
  </div>

  <!-- CART DRAWER (ver js/cart.js) -->
  <div class="cart-drawer" id="cart-drawer" aria-hidden="true">
    <div class="cart-drawer__backdrop" id="cart-drawer-backdrop"></div>
    <div class="cart-drawer__panel" role="dialog" aria-modal="true" aria-labelledby="cart-drawer-title">
      <div class="cart-drawer__header">
        <p class="cart-drawer__title" id="cart-drawer-title">Carrito</p>
        <button type="button" class="cart-drawer__close" id="cart-drawer-close" aria-label="Cerrar">&times;</button>
      </div>
      <div class="cart-drawer__items" id="cart-drawer-items"></div>
      <p class="cart-drawer__empty" id="cart-drawer-empty">Tu carrito está vacío.</p>
      <div class="cart-drawer__footer hidden" id="cart-drawer-footer">
        <div class="cart-drawer__field">
          <label class="cart-drawer__label" for="cart-drawer-discount">Código de descuento (opcional)</label>
          <input type="text" id="cart-drawer-discount" class="cart-drawer__input" placeholder="CÓDIGO" autocomplete="off" />
        </div>
        <div class="cart-drawer__total" id="cart-drawer-total"></div>
        <button type="button" class="btn-outline cart-drawer__submit" id="cart-drawer-submit" disabled>Pagar ahora →</button>
        <p class="cart-drawer__msg" id="cart-drawer-msg"></p>
      </div>
    </div>
  </div>

  <main class="result-page">
    <h1 class="result-page__title">GRACIAS.</h1>
    <p class="result-page__body">
      Tu pago se procesó correctamente. Te vamos a contactar por email para confirmar los detalles de tu envío.
    </p>
    <div class="result-page__actions">
      <a href="drops.html" class="btn-outline">Ver más Drops →</a>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <span class="footer__copy">© UNSPOTTED</span>
    <div class="footer__links">
      <a href="https://instagram.com/unspotted.official" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
        </svg>
        @unspotted.official
      </a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/cart.js"></script>
  <script>clearCart();</script>
  <script src="js/main.js"></script>
</body>
</html>
